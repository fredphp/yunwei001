version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: yunwei_nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ../wwwroot:/var/www/html/wwwroot:cached
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      php:
        condition: service_started
    restart: unless-stopped
    networks:
      - yunwei_net

  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: yunwei_php
    volumes:
      - ../wwwroot:/var/www/html/wwwroot:cached
    restart: unless-stopped
    networks:
      - yunwei_net

  mysql:
    image: mysql:8.0
    container_name: yunwei_mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
      MYSQL_DATABASE: "${MYSQL_DATABASE:-fantan_db}"
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/fantan_db.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/02_init.sql:ro
    command: >
      --max-heap-table-size=128M
      --tmp-table-size=128M
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --sql-mode=NO_ENGINE_SUBSTITUTION
      --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - yunwei_net

volumes:
  mysql_data:
    name: yunwei_mysql_data
  nginx_logs:
    name: yunwei_nginx_logs

networks:
  yunwei_net:
    name: yunwei_network
    driver: bridge
