# Nginx 配置 - 支持动态 DNS 解析
# 当 PHP 容器重启后 IP 变化，nginx 会自动重新解析，不会出现 502 Bad Gateway
# 关键技术：使用 resolver + 变量引用 fastcgi_pass

server {
    listen 80;
    server_name _;
    root /var/www/html/wwwroot;
    index index.php index.html;

    # 字符编码
    charset utf-8;

    # 日志
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Docker 内部 DNS 解析器（127.0.0.11 是 Docker 内置 DNS）
    # valid=10s 表示 DNS 缓存 10 秒后自动刷新
    # 这样当 PHP 容器重启获取新 IP 后，nginx 会在 10 秒内自动解析到新 IP
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 禁止访问敏感目录
    location ~ ^/(source|caches|configs)/ {
        deny all;
    }

    # 禁止直接访问 cron_service.php（仅限CLI运行）
    location ~ /cron_service\.php$ {
        deny all;
    }

    # 禁止执行上传目录中的 PHP
    location ~ ^/uppic/.*\.php$ {
        deny all;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp3)$ {
        expires 30d;
        access_log off;
    }

    # PHP 处理 - 使用变量方式确保动态 DNS 解析
    # 关键：直接写 fastcgi_pass php:9000 会在 nginx 启动时解析并缓存 IP
    #       使用变量 $php_upstream 后，nginx 每次请求都会通过 resolver 重新解析
    location ~ \.php$ {
        set $php_upstream php:9000;
        fastcgi_pass $php_upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param CHARSET utf-8;
        include fastcgi_params;
        fastcgi_read_timeout 120;
        fastcgi_send_timeout 120;
        # 确保 PHP 响应的 Content-Type 包含 charset
        fastcgi_pass_header Content-Type;
    }

    # 默认路由
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # 禁止访问隐藏文件
    location ~ /\. {
        deny all;
    }
}
