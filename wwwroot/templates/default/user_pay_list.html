<div class="main pay">
        <div class="header">
                <a class="back" href="?a=user" title="返回"><i class="iconfont icon-fanhui"></i></a>
                <a class="home" href="?a=init" title="首页"><i class="iconfont icon-home"></i></a>
                <h4><?php echo $headername?></h4>
        </div>
        <div class="scroll_box">
                <div class="table">
                        <div class="list">
                                <div class="onload"></div>
                        </div>
                </div>
                <div id="pages"><?php echo $pages?></div>
        </div>
</div>
<script type="text/javascript">
var paydata = <?php echo $paydata?>;//数据
var stamp = '<?php echo $this -> setting['stamp']?>';//货币单位
var state = new Array('<span style="color: #FFA700;">'+__('wait_pay')+'</span>', '<span style="color: #00B520;">'+__('online_deposit')+'</span>', '<span style="color: #0070FF;">'+__('manual_deposit')+'</span>', '<span style="color: #0070FF;">'+__('agent_deposit')+'</span>', '<span style="color: #F00;">'+__('deposit_failed')+'</span>');
$(function(){
        var html = '';
        $.each(paydata,function(i,v){
                var button = '';
                if (v.state == 0) {
                        button = '<li class="btn"><a href="?a=pay_ewm&payid='+v.payid+'">'+__('pay_now')+'</a></li>';
                }
                var comment = '';
                if (v.comment != '') {
                        comment = '<li class="msg">'+v.comment+'</li>';
                }
                //拼接数据
                html += ''+
                '<ul>'+
                        '<li class="w50 tl state">'+state[v.state]+'</li>'+
                        '<li class="w50 tr time">'+getLocalTime(v.addtime)+'</li>'+
                        '<li class="w30 val">'+stamp+v.money+'</li>'+
                        '<li class="w70 tr f12">'+__('order_no')+' '+v.payid+'</li>'+
                        comment+
                        button+
                '</ul>';
        });
        setTimeout(function() {//让加载效果显示，并保证元素加载完成
                if (html) {
                        $('.list').empty().append(html);
                } else {
                        $('.list').empty().append('<div class="no-data">'+__('no_data')+'</div>');
                }
        }, 100);
        //自动调整窗口
        $(window).resize(function() {
                var h = $(window).height();
                $('.scroll_box').css({'height':h-49});
        }).resize();
});
</script>
