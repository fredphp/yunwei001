<?php
// message.html - 独立消息提示页面（不依赖 header.html，避免 $this 上下文错误）
// 获取必要变量
$_title = isset($title) ? $title : L('tips');
$_lang = defined('ROUTE_LANG') ? ROUTE_LANG : 'zh-cn';
$_lang_attr = ($_lang == 'zh-cn') ? 'zh-CN' : (($_lang == 'en-us') ? 'en' : 'my');
?>
<!DOCTYPE html>
<html lang="<?php echo $_lang_attr?>">
<head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
        <title><?php echo $_title?></title>
        <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
        .msg-header { background: #e74c3c; color: #fff; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
        .msg-header a { color: #fff; text-decoration: none; font-size: 18px; }
        .msg-header h4 { font-size: 16px; font-weight: normal; }
        .msg-body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; padding: 40px 20px; text-align: center; }
        .msg-icon { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 32px; background: #fff1f0; color: #ff4d4f; }
        .msg-text { font-size: 15px; color: #555; margin-bottom: 25px; line-height: 1.6; max-width: 300px; }
        .msg-btn { display: inline-block; padding: 10px 40px; background: #e74c3c; color: #fff; border-radius: 4px; font-size: 15px; text-decoration: none; border: none; cursor: pointer; }

</head>
<body>
        <div class="msg-header">
                <a href="javascript:history.back(-1)">&#8592;</a>
                <h4><?php echo L('tips')?></h4>
                <a href="?a=init">&#8962;</a>
        </div>
        <div class="msg-body">
                <div class="msg-icon">!</div>
                <div class="msg-text"><?php echo $msg?></div>
                <?php if(isset($url_forward) && $url_forward && $url_forward != 'goback') { ?>
                        <a class="msg-btn" href="<?php echo $url_forward?>"><?php echo L('confirm')?></a>
                <?php } elseif(isset($url_forward) && $url_forward == 'goback') { ?>
                        <a class="msg-btn" href="javascript:history.back(-1)"><?php echo L('return')?></a>
                <?php } else { ?>
                        <a class="msg-btn" href="?a=init"><?php echo L('home')?></a>
                <?php } ?>
        </div>
</body>
</html>
