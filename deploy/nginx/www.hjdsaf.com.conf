server {
    listen 80;
    server_name www.hjdsaf.com;

    # HTTP -> HTTPS redirect
    location / {
        return 301 https://$host$request_uri;
    }

    # Let's Encrypt ACME challenge (for cert renewal via standalone)
    location ^~ /.well-known/acme-challenge/ {
        default_type "text/plain";
        root /var/www/yunwei001/wwwroot;
    }
}

server {
    listen 443 ssl http2 default_server backlog=65535;
    server_name www.hjdsaf.com;
    root /var/www/yunwei001/wwwroot;
    index index.php index.html;

    charset utf-8;

    # ========== SSL Configuration ==========
    ssl_certificate /etc/letsencrypt/live/www.hjdsaf.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.hjdsaf.com/privkey.pem;

    # SSL optimization - Mozilla Intermediate profile
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # SSL session cache (shared across all worker processes)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling (faster SSL handshake)
    # OCSP Stapling (requires OpenSSL 1.1.0+, disabled for current OpenSSL 1.0.2)
    # ssl_stapling on;
    # ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # HSTS (force HTTPS for 1 year, include subdomains)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # NOTE: limit_conn moved from server level to PHP locations only
    # This prevents 503 errors when game pages load many static assets simultaneously
    # Static assets (images, CSS, JS) are now exempt from connection limits

    # Nginx status page (for monitoring)
    # PHP-FPM status page (for monitoring)
    location ~ ^/(fpm_status|fpm_ping) {
        allow 127.0.0.1;
        deny all;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location /nginx_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Login rate limiting (anti brute-force)
    location ~* /(admin\.php|daili\.php) {
        limit_conn conn_limit 30;
        limit_req zone=login_limit burst=5 nodelay;
        try_files $uri /index.php?$query_string;
        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # PHP-FPM with optimized buffers
    location ~ \.php$ {
        # Connection limit only for dynamic PHP requests
        limit_conn conn_limit 30;
        # API rate limiting
        limit_req zone=api_limit burst=20 nodelay;

        fastcgi_pass unix:/run/php/php-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # FastCGI buffers (prevent 502 on large responses)
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;

        # FastCGI cache (skip for logged-in users, cache public pages)
        # Include user_lang in cache key so different language versions get different caches
        fastcgi_cache PHPCACHE;
        fastcgi_cache_valid 200 30s;
        fastcgi_cache_valid 301 302 1m;
        fastcgi_cache_valid 404 1s;
        fastcgi_cache_bypass $cookie_bc_app;
        fastcgi_no_cache $cookie_bc_app;
        fastcgi_cache_key $scheme$host$request_uri$cookie_user_lang;
        add_header X-Cache $upstream_cache_status;
        # Security headers (must repeat here because add_header in location overrides server-level)
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Connection keepalive to PHP-FPM
        fastcgi_keep_conn on;
    }

    # Static assets with aggressive caching - NO connection limit
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mp3|swf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Static "HIT";
        access_log off;
    }

    # Deny hidden files
    location ~ /\.ht {
        deny all;
    }

    # Deny sensitive files
    location ~ /\.(env|git|svn) {
        deny all;
    }

    access_log /var/log/nginx/www.hjdsaf.com.access.log main buffer=32k flush=5m;
    error_log /var/log/nginx/www.hjdsaf.com.error.log warn;
}
